<!doctype html>
<html>
  <head>
    <title>Dust — Showcase</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0c0c0c;
        color: #d4d4d4;
        min-height: 100vh;
        font-size: 15px;
        line-height: 1.5;
      }

      /* ── Header / Nav ─────────────────────────────── */
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 32px;
        height: 52px;
        border-bottom: 1px solid #1e1e1e;
        position: sticky;
        top: 0;
        background: #0c0c0c;
        z-index: 10;
      }

      .logo { font-weight: 700; font-size: 1rem; color: #fff; letter-spacing: -0.02em; }
      .logo span { color: #555; font-weight: 400; font-size: 0.8rem; margin-left: 8px; }

      nav { display: flex; gap: 2px; margin-left: auto; }

      nav a {
        padding: 5px 12px;
        border-radius: 6px;
        text-decoration: none;
        color: #666;
        font-size: 0.85rem;
        transition: color 0.1s, background 0.1s;
      }
      nav a:hover { color: #ccc; background: #161616; }
      nav a.active { color: #fff; background: #1e1e1e; }

      /* ── Page layout ──────────────────────────────── */
      main { max-width: 680px; margin: 0 auto; padding: 48px 32px; }

      section { margin-bottom: 56px; }

      .section-header { margin-bottom: 20px; }
      .section-header h2 { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
      .section-header p { font-size: 0.82rem; color: #555; }

      /* ── Demo card ────────────────────────────────── */
      .demo {
        background: #111;
        border: 1px solid #1e1e1e;
        border-radius: 10px;
        padding: 24px;
      }

      /* ── Buttons ──────────────────────────────────── */
      button {
        background: #1a1a1a;
        color: #ccc;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 7px 14px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: background 0.1s, color 0.1s;
      }
      button:hover { background: #222; color: #fff; }
      button:active { background: #2a2a2a; }
      button.danger { border-color: #3a1a1a; color: #c55; }
      button.danger:hover { background: #2a1010; color: #e66; }
      button.primary { border-color: #1e3a1e; color: #4c4; }
      button.primary:hover { background: #0f2010; color: #6d6; }

      /* ── Inputs ───────────────────────────────────── */
      input[type="text"], input[type="number"] {
        background: #141414;
        color: #d4d4d4;
        border: 1px solid #262626;
        border-radius: 6px;
        padding: 7px 12px;
        font-size: 0.85rem;
        outline: none;
        transition: border-color 0.1s;
      }
      input:focus { border-color: #444; }

      /* ── Counter page ─────────────────────────────── */
      .counter-display {
        font-size: 4rem;
        font-weight: 700;
        color: #fff;
        text-align: center;
        letter-spacing: -0.04em;
        margin: 16px 0;
      }
      .counter-controls { display: flex; justify-content: center; gap: 8px; }
      .counter-controls button { width: 44px; font-size: 1.1rem; }
      .derived { margin-top: 20px; padding-top: 20px; border-top: 1px solid #1e1e1e; font-size: 0.82rem; color: #555; }
      .derived span { color: #888; }

      /* ── Todo page ────────────────────────────────── */
      .todo-input { display: flex; gap: 8px; margin-bottom: 16px; }
      .todo-input input { flex: 1; }
      .todo-empty { color: #444; font-size: 0.85rem; padding: 12px 0; }
      .todo-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
      .todo-list li {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        background: #141414;
        border-radius: 6px;
        font-size: 0.85rem;
      }
      .todo-list li span { flex: 1; color: #ccc; }
      .todo-list li button { padding: 3px 8px; font-size: 0.75rem; }

      /* ── Profile page ─────────────────────────────── */
      .profile-card {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        margin-bottom: 20px;
      }
      .avatar {
        width: 56px; height: 56px;
        border-radius: 50%;
        background: #1e1e1e;
        border: 1px solid #2a2a2a;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.4rem; flex-shrink: 0;
      }
      .profile-info { flex: 1; }
      .profile-name { font-size: 1rem; font-weight: 600; color: #fff; }
      .profile-title { font-size: 0.82rem; color: #555; margin-top: 2px; }
      .profile-stats { display: flex; gap: 16px; margin-top: 10px; }
      .stat { font-size: 0.82rem; }
      .stat-label { color: #444; margin-right: 4px; }
      .stat-value { color: #aaa; }
      .xp-bar {
        height: 4px; background: #1e1e1e; border-radius: 2px;
        margin-top: 12px; overflow: hidden;
      }
      .xp-fill { height: 100%; background: #2d5a2d; border-radius: 2px; width: 0%; transition: width 0.2s; }
      .profile-actions { display: flex; gap: 8px; flex-wrap: wrap; }

      /* ── Timer page ───────────────────────────────── */
      .timer-display {
        font-size: 3.5rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.04em;
        text-align: center;
        margin: 8px 0 20px;
        font-variant-numeric: tabular-nums;
      }
      .timer-display .unit { font-size: 1rem; color: #444; font-weight: 400; margin-left: 4px; }
      .timer-controls { display: flex; justify-content: center; gap: 8px; }
      .effect-log {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #1e1e1e;
        font-size: 0.8rem;
        color: #444;
        max-height: 80px;
        overflow: hidden;
      }
      .effect-log p { color: #555; }
      .log-entry { color: #3a5a3a; animation: fadein 0.2s; }
      @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
